name: Open publication pull request

on:
  push:
    branches:
      - ecodrive-public-sync

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: open-publication-pr
  cancel-in-progress: true

jobs:
  open-or-update:
    runs-on: ubuntu-latest
    steps:
      - name: Open or update publication pull request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HEAD_BRANCH: ecodrive-public-sync
          BASE_BRANCH: main
        shell: bash
        run: |
          set -euo pipefail
          title="Publish EcoDrive public resources"
          body="Automated public-resource update from the private EcoDrive source repository. Review the validation checks and merge when ready."

          existing="$(
            gh api \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "repos/${GITHUB_REPOSITORY}/pulls?state=open&base=${BASE_BRANCH}&head=${GITHUB_REPOSITORY_OWNER}:${HEAD_BRANCH}" \
              --jq '.[0].number // empty'
          )"

          if [ -n "$existing" ]; then
            gh api \
              --method PATCH \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "repos/${GITHUB_REPOSITORY}/pulls/${existing}" \
              -f title="$title" \
              -f body="$body" >/dev/null
            echo "Updated publication pull request #${existing}."
          else
            gh api \
              --method POST \
              -H "Accept: application/vnd.github+json" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "repos/${GITHUB_REPOSITORY}/pulls" \
              -f title="$title" \
              -f head="$HEAD_BRANCH" \
              -f base="$BASE_BRANCH" \
              -f body="$body" \
              --jq '"Created publication pull request #\(.number): \(.html_url)"'
