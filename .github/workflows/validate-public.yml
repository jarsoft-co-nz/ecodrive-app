name: Validate public repository

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check required public files
        shell: bash
        run: |
          set -euo pipefail
          for file in README.md privacy-policy.md terms-of-service.md SECURITY.md SUPPORT.md CONTRIBUTING.md; do
            test -s "$file" || { echo "Missing or empty: $file" >&2; exit 1; }
          done
          test -s .github/ISSUE_TEMPLATE/bug_report.yml
          test -s .github/ISSUE_TEMPLATE/feature_request.yml
          test -s .github/ISSUE_TEMPLATE/config.yml

      - name: Reject placeholders and obvious secrets
        shell: bash
        run: |
          set -euo pipefail
          if grep -RInE '\[(INSERT|TODO|TBC)|<[^>]+>|YOUR_|example\.com' \
            --exclude-dir=.git \
            --exclude-dir=workflows \
            .; then
            echo "Unresolved placeholder found." >&2
            exit 1
          fi
          if grep -RInE '(ghp_|github_pat_|AIza[0-9A-Za-z_-]{20,}|BEGIN (RSA |EC |OPENSSH )?PRIVATE KEY)' \
            --exclude-dir=.git \
            --exclude-dir=workflows \
            .; then
            echo "Possible credential found." >&2
            exit 1
          fi

      - name: Validate issue-form YAML
        shell: bash
        run: |
          ruby -e 'require "yaml"; Dir[".github/ISSUE_TEMPLATE/*.{yml,yaml}"].each { |f| YAML.safe_load(File.read(f), aliases: true); puts "validated #{f}" }'
